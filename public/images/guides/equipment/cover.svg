<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="metal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c0c0c0"/>
      <stop offset="50%" style="stop-color:#e8e8e8"/>
      <stop offset="100%" style="stop-color:#a0a0a0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Forge glow -->
  <ellipse cx="400" cy="450" rx="300" ry="150" fill="#e25822" opacity="0.15"/>
  <ellipse cx="400" cy="450" rx="200" ry="100" fill="#ff6b35" opacity="0.1"/>
  <!-- Anvil -->
  <rect x="340" y="300" width="120" height="20" rx="3" fill="#555"/>
  <rect x="350" y="320" width="100" height="50" rx="2" fill="#444"/>
  <rect x="360" y="370" width="80" height="30" fill="#333"/>
  <!-- Weapons display -->
  <!-- Sword -->
  <g transform="translate(200, 80) rotate(-15)">
    <rect x="0" y="0" width="6" height="150" rx="1" fill="url(#metal)"/>
    <rect x="-15" y="130" width="36" height="8" rx="2" fill="#8B4513"/>
    <rect x="-5" y="138" width="16" height="20" rx="2" fill="#654321"/>
  </g>
  <!-- Axe -->
  <g transform="translate(570, 60) rotate(10)">
    <rect x="0" y="0" width="5" height="160" rx="1" fill="#8B4513"/>
    <path d="M-5,0 Q-30,30 -5,60 L25,30Z" fill="url(#metal)"/>
  </g>
  <!-- Shield -->
  <g transform="translate(350, 60)">
    <path d="M50,0 L100,20 L100,80 L50,110 L0,80 L0,20Z" fill="#2c5f8a" stroke="#c0c0c0" stroke-width="3"/>
    <path d="M50,15 L85,30 L85,72 L50,95 L15,72 L15,30Z" fill="#1a3a5c" stroke="#888" stroke-width="1"/>
    <line x1="50" y1="15" x2="50" y2="95" stroke="#c0c0c0" stroke-width="2"/>
    <line x1="15" y1="50" x2="85" y2="50" stroke="#c0c0c0" stroke-width="2"/>
    <circle cx="50" cy="50" r="10" fill="#ffd700" opacity="0.8"/>
  </g>
  <!-- Sparks -->
  <circle cx="380" cy="290" r="2" fill="#ffd700" opacity="0.8"/>
  <circle cx="420" cy="280" r="1.5" fill="#ff6b35" opacity="0.7"/>
  <circle cx="370" cy="270" r="1" fill="#ffd700" opacity="0.6"/>
  <circle cx="440" cy="295" r="2" fill="#ff6b35" opacity="0.9"/>
  <circle cx="360" cy="300" r="1.5" fill="#ffd700" opacity="0.7"/>
  <!-- Text -->
  <text x="400" y="420" text-anchor="middle" font-family="Georgia, serif" font-size="28" fill="#ffd700" letter-spacing="4">WEAPONS &amp; ARMOR</text>
  <text x="400" y="445" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#aac" letter-spacing="6">EQUIPMENT GUIDE</text>
</svg>
