  <rect x="420" y="237" width="185" height="6" rx="2" fill="#bbb"/>
  <rect x="420" y="248" width="175" height="6" rx="2" fill="#bbb"/>
  <!-- Bottom section -->
  <rect x="410" y="300" width="210" height="8" rx="2" fill="#999"/>
  <rect x="410" y="315" width="195" height="6" rx="2" fill="#bbb"/>
  <rect x="410" y="326" width="200" height="6" rx="2" fill="#bbb"/>
  <rect x="410" y="337" width="180" height="6" rx="2" fill="#bbb"/>
  <rect x="410" y="348" width="190" height="6" rx="2" fill="#bbb"/>
  <!-- Bottom bar -->
  <rect x="150" y="390" width="500" height="4" fill="#c0392b" opacity="0.6"/>
  <text x="400" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#556" letter-spacing="4">LATEST NEWS &amp; UPDATES</text>
