<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#1f2a48"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Newspaper layout -->
  <rect x="150" y="40" width="500" height="350" rx="5" fill="#f5f0e8" opacity="0.95"/>
  <rect x="150" y="40" width="500" height="40" rx="5" fill="#2c3e50"/>
  <rect x="155" y="45" width="490" height="30" rx="3" fill="#2c3e50"/>
