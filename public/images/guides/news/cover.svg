  <!-- Headline area -->
  <rect x="170" y="95" width="460" height="80" fill="#ddd"/>
  <rect x="170" y="95" width="460" height="80" fill="#3a506b" opacity="0.8"/>
  <text x="400" y="125" text-anchor="middle" font-family="Georgia, serif" font-size="20" fill="#fff">RELEASE DATE</text>
  <text x="400" y="150" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#ccc">CONFIRMED FOR 2026</text>
  <!-- Article columns -->
  <rect x="170" y="190" width="220" height="8" rx="2" fill="#999"/>
  <rect x="170" y="205" width="200" height="6" rx="2" fill="#bbb"/>
  <rect x="170" y="216" width="210" height="6" rx="2" fill="#bbb"/>
  <rect x="170" y="227" width="180" height="6" rx="2" fill="#bbb"/>
  <rect x="170" y="238" width="195" height="6" rx="2" fill="#bbb"/>
  <rect x="170" y="256" width="220" height="8" rx="2" fill="#999"/>
  <rect x="170" y="271" width="190" height="6" rx="2" fill="#bbb"/>
  <rect x="170" y="282" width="205" height="6" rx="2" fill="#bbb"/>
  <rect x="170" y="293" width="175" height="6" rx="2" fill="#bbb"/>
  <!-- Right column -->
  <rect x="410" y="190" width="210" height="100" fill="#e8e0d4"/>
  <rect x="410" y="190" width="210" height="15" fill="#c0392b" opacity="0.8"/>
  <text x="515" y="202" text-anchor="middle" font-size="10" fill="#fff">LATEST UPDATE</text>
  <rect x="420" y="215" width="190" height="6" rx="2" fill="#bbb"/>
