<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3c2e"/>
      <stop offset="50%" style="stop-color:#2d5738"/>
      <stop offset="100%" style="stop-color:#1e4d30"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Grass ground -->
  <path d="M0,380 Q100,370 200,385 Q300,390 400,375 Q500,370 600,385 Q700,390 800,375 L800,450 L0,450Z" fill="#2d6b3f"/>
  <path d="M0,400 Q150,390 300,400 Q450,405 600,395 Q700,390 800,395 L800,450 L0,450Z" fill="#246034"/>
  <!-- Horse silhouette -->
  <g transform="translate(250, 130) scale(1.3)">
    <!-- Body -->
    <ellipse cx="120" cy="90" rx="80" ry="45" fill="#3d2b1f"/>
    <!-- Neck -->
    <path d="M170,75 Q190,40 185,10 L175,15 Q178,45 160,70Z" fill="#3d2b1f"/>
    <!-- Head -->
    <ellipse cx="180" cy="10" rx="22" ry="14" fill="#3d2b1f"/>
    <!-- Ear -->
    <polygon points="175,-5 172,5 180,3" fill="#3d2b1f"/>
    <!-- Eye -->
    <circle cx="190" cy="8" r="3" fill="#111"/>
    <!-- Mane -->
    <path d="M175,15 Q165,35 168,55 Q160,50 158,30 Q155,45 152,60" fill="#2a1d12" stroke="#2a1d12" stroke-width="2"/>
    <!-- Legs -->
    <rect x="60" y="125" width="12" height="60" rx="4" fill="#3d2b1f"/>
    <rect x="90" y="125" width="12" height="55" rx="4" fill="#3d2b1f"/>
    <rect x="145" y="125" width="12" height="55" rx="4" fill="#3d2b1f"/>
    <rect x="170" y="120" width="12" height="60" rx="4" fill="#3d2b1f"/>
    <!-- Tail -->
    <path d="M40,80 Q20,100 25,130 Q15,120 18,95 Q10,110 15,85" fill="#2a1d12" stroke="#2a1d12" stroke-width="3"/>
    <!-- Saddle -->
    <path d="M100,55 Q120,48 155,55 L155,72 Q120,65 100,72Z" fill="#8B4513"/>
    <rect x="105" y="45" width="45" height="6" rx="2" fill="#654321"/>
  </g>
  <!-- Dust particles -->
  <circle cx="200" cy="370" r="4" fill="#d4b896" opacity="0.4"/>
  <circle cx="180" cy="360" r="3" fill="#d4b896" opacity="0.3"/>
  <circle cx="220" cy="365" r="5" fill="#d4b896" opacity="0.35"/>
  <!-- Warm sunset glow -->
  <ellipse cx="650" cy="120" rx="80" ry="60" fill="#f39c12" opacity="0.15"/>
  <ellipse cx="650" cy="120" rx="50" ry="35" fill="#f9e79f" opacity="0.2"/>
  <!-- Text -->
  <text x="400" y="430" text-anchor="middle" font-family="Georgia, serif" font-size="28" fill="#f39c12" letter-spacing="4">MOUNTS</text>
  <text x="400" y="448" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#8cb" letter-spacing="6">TAMING &amp; RIDING GUIDE</text>
</svg>
