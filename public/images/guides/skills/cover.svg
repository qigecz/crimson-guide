<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1b2a"/>
      <stop offset="50%" style="stop-color:#1b2838"/>
      <stop offset="100%" style="stop-color:#162447"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00d2ff"/>
      <stop offset="100%" style="stop-color:#3a7bd5"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Skill tree connections -->
  <g stroke="#1e5f8a" stroke-width="1.5" opacity="0.6">
    <line x1="400" y1="60" x2="280" y2="140"/>
    <line x1="400" y1="60" x2="520" y2="140"/>
    <line x1="280" y1="140" x2="180" y2="240"/>
    <line x1="280" y1="140" x2="340" y2="240"/>
    <line x1="520" y1="140" x2="460" y2="240"/>
    <line x1="520" y1="140" x2="620" y2="240"/>
    <line x1="180" y1="240" x2="150" y2="340"/>
    <line x1="180" y1="240" x2="250" y2="340"/>
    <line x1="340" y1="240" x2="320" y2="340"/>
    <line x1="460" y1="240" x2="480" y2="340"/>
    <line x1="620" y1="240" x2="600" y2="340"/>
    <line x1="620" y1="240" x2="680" y2="340"/>
  </g>
  <!-- Skill nodes (top) -->
  <circle cx="400" cy="60" r="18" fill="none" stroke="url(#glow)" stroke-width="3"/>
  <circle cx="400" cy="60" r="10" fill="#00d2ff" opacity="0.8"/>
  <!-- Tier 2 -->
  <circle cx="280" cy="140" r="14" fill="none" stroke="#3a7bd5" stroke-width="2.5"/>
  <circle cx="280" cy="140" r="7" fill="#3a7bd5" opacity="0.7"/>
  <circle cx="520" cy="140" r="14" fill="none" stroke="#3a7bd5" stroke-width="2.5"/>
  <circle cx="520" cy="140" r="7" fill="#3a7bd5" opacity="0.7"/>
  <!-- Tier 3 -->
  <circle cx="180" cy="240" r="12" fill="#2a5a8a" opacity="0.5" stroke="#4a8abf" stroke-width="2"/>
  <circle cx="340" cy="240" r="12" fill="#2a5a8a" opacity="0.5" stroke="#4a8abf" stroke-width="2"/>
  <circle cx="460" cy="240" r="12" fill="#2a5a8a" opacity="0.5" stroke="#4a8abf" stroke-width="2"/>
  <circle cx="620" cy="240" r="12" fill="#2a5a8a" opacity="0.5" stroke="#4a8abf" stroke-width="2"/>
  <!-- Tier 4 (locked) -->
  <g opacity="0.35">
    <circle cx="150" cy="340" r="10" fill="none" stroke="#556" stroke-width="2"/>
    <circle cx="250" cy="340" r="10" fill="none" stroke="#556" stroke-width="2"/>
    <circle cx="320" cy="340" r="10" fill="none" stroke="#556" stroke-width="2"/>
    <circle cx="480" cy="340" r="10" fill="none" stroke="#556" stroke-width="2"/>
    <circle cx="600" cy="340" r="10" fill="none" stroke="#556" stroke-width="2"/>
    <circle cx="680" cy="340" r="10" fill="none" stroke="#556" stroke-width="2"/>
  </g>
  <!-- Energy glow -->
  <ellipse cx="400" cy="60" rx="60" ry="40" fill="#00d2ff" opacity="0.08"/>
  <ellipse cx="400" cy="60" rx="90" ry="60" fill="#00d2ff" opacity="0.04"/>
  <!-- Text -->
  <text x="400" y="415" text-anchor="middle" font-family="Georgia, serif" font-size="28" fill="#00d2ff" letter-spacing="4">SKILL TREE</text>
  <text x="400" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#8bc" letter-spacing="6">COMBAT &amp; ABYSS SKILLS</text>
</svg>
