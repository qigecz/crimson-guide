<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="50%" style="stop-color:#152238"/>
      <stop offset="100%" style="stop-color:#1a3050"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Road/path -->
  <path d="M350,450 Q380,350 400,300 Q420,250 430,200 Q440,160 450,100 Q460,60 480,0" stroke="#2a4a6a" stroke-width="40" fill="none" opacity="0.4" stroke-linecap="round"/>
  <path d="M350,450 Q380,350 400,300 Q420,250 430,200 Q440,160 450,100 Q460,60 480,0" stroke="#3a5a7a" stroke-width="2" fill="none" opacity="0.3" stroke-dasharray="10,15"/>
  <!-- Guideposts -->
  <g transform="translate(380, 300)">
    <rect x="0" y="0" width="4" height="50" fill="#8B4513"/>
    <rect x="-20" y="-5" width="50" height="18" rx="3" fill="#654321"/>
    <text x="5" y="8" font-size="8" fill="#ddd">→ Hernand</text>
  </g>
  <g transform="translate(430, 180)">
    <rect x="0" y="0" width="4" height="40" fill="#8B4513"/>
    <rect x="-18" y="-5" width="48" height="16" rx="3" fill="#654321"/>
    <text x="5" y="6" font-size="7" fill="#ddd">→ Greymane</text>
  </g>
  <!-- "?" markers -->
  <g>
    <circle cx="200" cy="150" r="15" fill="#f39c12" opacity="0.8"/>
    <text x="200" y="156" text-anchor="middle" font-size="18" font-weight="bold" fill="#fff">?</text>
  </g>
  <g>
    <circle cx="600" cy="200" r="15" fill="#f39c12" opacity="0.8"/>
    <text x="600" y="206" text-anchor="middle" font-size="18" font-weight="bold" fill="#fff">?</text>
  </g>
  <g>
    <circle cx="300" cy="100" r="12" fill="#27ae60" opacity="0.8"/>
    <text x="300" y="106" text-anchor="middle" font-size="15" font-weight="bold" fill="#fff">!</text>
  </g>
  <g>
    <circle cx="550" cy="120" r="12" fill="#27ae60" opacity="0.8"/>
    <text x="550" y="126" text-anchor="middle" font-size="15" font-weight="bold" fill="#fff">!</text>
  </g>
  <!-- Lantern glow -->
  <circle cx="400" cy="350" r="8" fill="#ffd700" opacity="0.6"/>
  <circle cx="400" cy="350" r="25" fill="#ffd700" opacity="0.1"/>
  <!-- Stars -->
  <circle cx="50" cy="30" r="1.5" fill="#fff" opacity="0.6"/>
  <circle cx="150" cy="50" r="1" fill="#fff" opacity="0.4"/>
  <circle cx="700" cy="40" r="1.5" fill="#fff" opacity="0.7"/>
  <circle cx="750" cy="80" r="1" fill="#fff" opacity="0.5"/>
  <!-- Text -->
  <text x="400" y="420" text-anchor="middle" font-family="Georgia, serif" font-size="28" fill="#3a9fd5" letter-spacing="4">BEGINNER'S GUIDE</text>
  <text x="400" y="445" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#6ab" letter-spacing="6">FIRST STEPS IN PYWEL</text>
</svg>
